@let heroHtml = profileService.profile?.hero_html;

<p class="hero-text" [innerHtml]="heroHtml"></p>

@if (!paintingsService.paintings.length) {
  <div class="loader-box">
    <mat-spinner [diameter]="20" [strokeWidth]="2" />
  </div>
}

<div class="gallery-grid">
  @for (column of paintingsColumns(); track $index; let i = $index) {
    <div>
      @for (painting of column; track painting.id) {
        <shari-painting-preview [painting]="painting" />
      }
    </div>
  }
</div>
