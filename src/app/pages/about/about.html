@let pf = profileService.profile;

@if (pf) {
  <!-- Hero Banner -->
  <section class="hero-section">
    @if (isLoadingCoverImg()) {
      <div class="skeleton hero-skeleton"></div>
    }

    <img
      class="hero-image"
      [src]="pf.coverImageUrl"
      (load)="isLoadingCoverImg.set(false)"
      [class.invisible]="isLoadingCoverImg()"
      alt="Cover image"
    />

    <div class="hero-overlay"></div>
    <h1 class="hero-name">{{ pf.name }}</h1>
  </section>

  <!-- Artist Intro: Profile + Contact -->
  <section class="artist-intro">
    <div class="profile-image-box">
      @if (isLoadingProfileImg()) {
        <div class="skeleton profile-skeleton"></div>
      }

      <img
        [src]="pf.profileImageUrl"
        (load)="isLoadingProfileImg.set(false)"
        [class.invisible]="isLoadingProfileImg()"
        alt="My profile picture"
      />
    </div>

    <div class="contact-links">
      <a class="contact-link" href="http://www.instagram.com/shari_art_cape_town" target="_blank">
        <img src="./instagram_icon.png" alt="Instagram Icon" />
        <span>@shari_art_cape_town</span>
      </a>

      @let email = pf.email;

      @if (email) {
        <a class="contact-link" [href]="'mailto:' + email" target="_blank">
          <img src="./email_icon.png" alt="Email Icon" />
          <span>{{ email }}</span>
        </a>
      }
    </div>
  </section>

  <!-- Story Section: Bio + Studio Images Alternating -->
  <section class="story-section">
    @for (txt_img of profileService.bioText_ImageList; track $index) {
      <div class="story-block slide" [class.reverse]="$odd" #animateOnScroll>
        <p class="story-text" [innerHtml]="txt_img.text"></p>

        <div class="story-image">
          <div class="image-placeholder">
            <img [src]="txt_img.imageUrl" alt="In the studio" />
          </div>
        </div>
      </div>
    }
  </section>
} @else {
  <div class="loader-box">
    <mat-spinner [diameter]="20" [strokeWidth]="2" />
  </div>
}
