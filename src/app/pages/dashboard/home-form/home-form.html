@let loading = isLoading();

<form [formGroup]="form">
  <h2 class="form-title">
    Hero Section
  </h2>

  <div class="control-field">
    <textarea type="text" id="textContent" formControlName="textContent" class="shari-input"></textarea>
    <label for="textContent" [class.top]="form.get('textContent')?.value">Hero Text Content</label>
  </div>

  <small>
    You can use HTML to format the text (Inline styles do not work though!).
  </small>

  <div class="buttons-box">
    <shari-button type="button" variant="outlined" (onClick)="closeForm()" [disabled]="loading">
      Cancel
    </shari-button>

    <shari-button type="button" (onClick)="onSaveClick()" [disabled]="loading">
      @if (loading) {
      <mat-spinner [diameter]="15" [strokeWidth]="2" />
      } @else {
      Save
      }
    </shari-button>
  </div>

</form>
