@let updatingPW = isUpdatingPassword();

<form [formGroup]="passwordForm" (ngSubmit)="onPasswordFormSubmit()">
  <h2 class="form-title">Update Password</h2>

  <div class="control-field">
    <input
      type="password"
      id="currentPassword"
      formControlName="currentPassword"
      class="shari-input"
      #currPwInput
    />
    <label for="currentPassword" [class.top]="passwordForm.get('currentPassword')?.value"
      >Current Password</label
    >
    <shari-password-toggle [input]="currPwInput" />
  </div>

  <div class="control-field">
    <input
      type="password"
      id="newPassword"
      formControlName="newPassword"
      class="shari-input"
      #newPwInput
    />
    <label for="newPassword" [class.top]="passwordForm.get('newPassword')?.value"
      >New Password</label
    >
    <shari-password-toggle [input]="newPwInput" />
  </div>

  <div class="form-footer">
    <small class="password-error">{{ passwordError() }}</small>

    <shari-button
      type="submit"
      class="pw-reset-button"
      [disabled]="updatingPW || passwordForm.invalid"
    >
      @if (updatingPW) {
        <mat-spinner [diameter]="15" [strokeWidth]="2" />
      } @else {
        Update Password
      }
    </shari-button>
  </div>
</form>
