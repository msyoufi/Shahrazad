@let total = paintingsService.paintings.length;

<div class="overview-header">
  <p>
    @if (total) {
      Total: {{ total }}
    } @else {
      loading...
    }
  </p>

  <shari-button (onClick)="onAddClick()"> New Painting + </shari-button>
</div>

<div class="paintings-grid">
  @if (!total) {
    @for (_ of loadersCount; track $index) {
      <shari-painting-item-loader />
    }
  } @else {
    @for (pt of paintings(); track pt.id) {
      <shari-painting-item [painting]="pt" (orderButtonClick)="openOrderModal($event)" />
    }

    <a class="add-box" routerLink="/dashboard-1975/painting/new">+</a>
  }
</div>

<mat-paginator
  [length]="total"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[10, 25, 50]"
  aria-label="Select page"
  showFirstLastButtons
  (page)="onPageChange($event)"
  [disabled]="!total"
>
</mat-paginator>

@if (selectedPainting()) {
  <shari-order-modal [painting]="selectedPainting()!" (close)="closeOrderModal()" />
}
